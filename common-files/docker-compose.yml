name: ecommerce

services:
  # ── PostgreSQL 16 with pgvector pre-installed ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16 # official pgvector image
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - ./pg_db_data:/var/lib/postgresql/data
      - ./init-postgres-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ragdb']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Mongo DB for Orders Collection ────────────────────────────────────────────────────
  mongodb:
    image: mongo:8.2 # Use a specific stable version tag
    container_name: mongo_db
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin_user
      MONGO_INITDB_ROOT_PASSWORD: admin_pwd
      MONGO_INITDB_DATABASE: ecommerce_db
    volumes:
      - ./mongo_db_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          'admin',
          '-u',
          'admin_user',
          '-p',
          'admin_pwd',
          '--eval',
          'quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Product RAG API application ────────────────────────────────────────────────────
  product_rag_api:
    image: ecommerce/product_rag_api:latest
    container_name: product_rag_api
    env_file:
      - path: ../product-rag-api/.env
        required: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MAX_WORKERS: 4
      POSTGRES_HOST: postgres
    ports:
      - '8001:8000'
    healthcheck:
      # python:3.13-slim already has python; avoids installing curl
      test:
        [
          'CMD-SHELL',
          "python - <<'PY'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://localhost:8000/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nPY",
        ]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Refund RAG API application ────────────────────────────────────────────────────
  refund_rag_api:
    image: ecommerce/refund_rag_api:latest
    container_name: refund_rag_api
    env_file:
      - path: ../refund-rag-api/.env
        required: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MAX_WORKERS: 4
      POSTGRES_HOST: postgres
    ports:
      - '8002:8000'
    healthcheck:
      # python:3.13-slim already has python; avoids installing curl
      test:
        [
          'CMD-SHELL',
          "python - <<'PY'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://localhost:8000/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nPY",
        ]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Order API application ────────────────────────────────────────────────────
  order_mongo_app:
    image: ecommerce/order_mongo_app:latest
    container_name: order_mongo_app
    env_file:
      - path: ../order-api/.env
        required: true
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_DB_HOST: mongodb
    ports:
      - '8003:8000'
    healthcheck:
      # python:3.13-slim already has python; avoids installing curl
      test:
        [
          'CMD-SHELL',
          "python - <<'PY'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://localhost:8000/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nPY",
        ]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Refund API application ────────────────────────────────────────────────────
  refund_mongo_app:
    image: ecommerce/refund_mongo_app:latest
    container_name: refund_mongo_app
    env_file:
      - path: ../refund-api/.env
        required: true
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_DB_HOST: mongodb
    ports:
      - '8004:8000'
    healthcheck:
      # python:3.13-slim already has python; avoids installing curl
      test:
        [
          'CMD-SHELL',
          "python - <<'PY'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://localhost:8000/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nPY",
        ]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── E-Commerce Customer Support System application ────────────────────────────────────────────────────
  ecommerce_support_app:
    image: ecommerce/ecommerce_support_app:latest
    container_name: ecommerce_support_app
    env_file:
      - path: ../ecommerce-support/.env
        required: true
    restart: unless-stopped
    depends_on:
      product_rag_api:
        condition: service_healthy
      refund_rag_api:
        condition: service_healthy
      order_mongo_app:
        condition: service_healthy
      refund_mongo_app:
        condition: service_healthy
    environment:
      PRODUCT_RAG_BASE_URL: http://product_rag_api:8000
      REFUND_POLICY_RAG_BASE_URL: http://refund_rag_api:8000
      ORDER_API_BASE_URL: http://order_mongo_app:8000
      REFUND_API_BASE_URL: http://refund_mongo_app:8000
    ports:
      - '9000:8000'
    healthcheck:
      # python:3.13-slim already has python; avoids installing curl
      test:
        [
          'CMD-SHELL',
          "python - <<'PY'\nimport urllib.request, sys\ntry:\n  urllib.request.urlopen('http://localhost:8000/health', timeout=2)\n  sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nPY",
        ]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 10s
